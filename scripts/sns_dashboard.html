<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-PLOG SNS 대시보드</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; }
        .glass-card {
            background: rgba(33, 38, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(240, 246, 252, 0.1);
        }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-white mb-2">🚀 D-PLOG SNS Session Dashboard</h1>
            <p class="text-gray-400">네이버 블로그 및 인스타그램의 봇 자동화 세션을 실시간으로 관리하세요.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Naver Card -->
            <div class="glass-card rounded-2xl p-6 transition-all hover:border-[#03c75a]">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                        <span class="w-4 h-4 rounded-sm bg-[#03c75a] block"></span> 네이버 블로그
                    </h2>
                    <div id="naver-dot" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                </div>
                
                <div class="bg-[#161b22] rounded-lg p-4 mb-6">
                    <p class="text-sm text-gray-400 mb-1">세션 상태</p>
                    <p id="naver-status" class="text-lg font-semibold text-red-400 mb-3">로그인 필요 (파일 없음)</p>
                    <p class="text-sm text-gray-500 flex justify-between">
                        <span>생성일시: <span id="naver-date">-</span></span>
                        <span>크기: <span id="naver-size">-</span></span>
                    </p>
                </div>

                <div class="flex gap-3">
                    <button onclick="triggerLogin('naver')" class="flex-1 bg-[#03c75a] hover:bg-[#02a84c] text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-lg shadow-[#03c75a]/20">
                        🔄 자동 로그인 갱신
                    </button>
                    <button onclick="deleteSession('naver')" class="px-4 py-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 font-bold border border-red-500/30 rounded-xl transition-all">
                        삭제
                    </button>
                </div>
            </div>

            <!-- Instagram Card -->
            <div class="glass-card rounded-2xl p-6 transition-all hover:border-[#E1306C]">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                        <span class="w-4 h-4 rounded-sm bg-gradient-to-tr from-[#F58529] via-[#DD2A7B] to-[#8134AF] block"></span> 인스타그램
                    </h2>
                    <div id="insta-dot" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                </div>
                
                <div class="bg-[#161b22] rounded-lg p-4 mb-6">
                    <p class="text-sm text-gray-400 mb-1">세션 상태</p>
                    <p id="insta-status" class="text-lg font-semibold text-red-400 mb-3">로그인 필요 (파일 없음)</p>
                    <p class="text-sm text-gray-500 flex justify-between">
                        <span>생성일시: <span id="insta-date">-</span></span>
                        <span>크기: <span id="insta-size">-</span></span>
                    </p>
                </div>

                <div class="flex flex-col gap-3">
                    <div class="flex gap-3">
                        <button onclick="triggerLogin('insta')" class="flex-1 bg-gradient-to-r from-[#F58529] via-[#DD2A7B] to-[#8134AF] hover:opacity-90 text-white font-bold py-3 px-4 rounded-xl transition-opacity shadow-lg shadow-[#DD2A7B]/20">
                            🔄 자동 접속 및 접속상태 갱신
                        </button>
                        <button onclick="deleteSession('insta')" class="px-4 py-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 font-bold border border-red-500/30 rounded-xl transition-all">
                            삭제
                        </button>
                    </div>
                    <!-- 실제 업로드 스크립트 실행 버튼 -->
                    <button onclick="triggerPublish('insta')" class="w-full mt-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-4 rounded-xl transition-all border border-blue-400/30 shadow-[0_0_15px_rgba(37,99,235,0.4)] text-lg flex justify-center items-center gap-2">
                        🚀 인스타그램 실전 피드 포스팅 가동!
                    </button>
                </div>
            </div>
        </div>
        
        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 transform scale-95 pointer-events-none border border-gray-600 z-50 whitespace-nowrap">
            알림 메시지
        </div>
    </div>

    <script>
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100', 'scale-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'scale-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                updateCard('naver', data.naver, '#03c75a');
                updateCard('insta', data.instagram, '#E1306C');
            } catch (error) {
                console.error("Status fetch error", error);
            }
        }

        function updateCard(platform, data, colorStr) {
            const dot = document.getElementById(`${platform}-dot`);
            const statusText = document.getElementById(`${platform}-status`);
            
            document.getElementById(`${platform}-date`).textContent = data.last_updated;
            document.getElementById(`${platform}-size`).textContent = data.size;

            if(data.status === 'active') {
                dot.className = `w-3 h-3 rounded-full shadow-[0_0_10px_${colorStr}]`;
                dot.style.backgroundColor = colorStr;
                statusText.textContent = "🟢 정상 동작 중 (세션 유효)";
                statusText.className = "text-lg font-semibold text-green-400 mb-3";
            } else {
                dot.className = "w-3 h-3 rounded-full bg-red-500 animate-pulse";
                dot.style.backgroundColor = '';
                statusText.textContent = "🔴 로그인 필요 (세션 만료)";
                statusText.className = "text-lg font-semibold text-red-400 mb-3";
            }
        }

        async function triggerLogin(platform) {
            const res = await fetch(`/api/login/${platform}`, { method: 'POST' });
            const data = await res.json();
            
            if (data.error) {
                showToast(`❌ ${data.error}`);
            } else {
                showToast(data.message);
            }
        }

        async function triggerPublish(platform) {
            const res = await fetch(`/api/publish/${platform}`, { method: 'POST' });
            const data = await res.json();
            showToast(data.message || `🚀 ${platform} 포스팅이 시작되었습니다!`);
        }

        async function deleteSession(platform) {
            if(!confirm(`정말 ${platform} 세션을 지우시겠습니까?`)) return;
            await fetch(`/api/session/${platform}`, { method: 'DELETE' });
            fetchStatus();
            showToast(`휴지통: ${platform} 세션이 폐기되었습니다.`);
        }

        // 3초마다 상태 폴링 (창이 닫히면 파일이 생기므로 바로 감지됨)
        setInterval(fetchStatus, 3000);
        fetchStatus();
    </script>
</body>
</html>
