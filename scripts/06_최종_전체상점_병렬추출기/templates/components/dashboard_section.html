<section id="chartView" class="hidden max-w-[1400px] mx-auto space-y-6">
    <h2 class="text-2xl font-bold tracking-tight mb-2" id="chartStoreTitle">상점 대시보드</h2>
    <div id="chartStoreMeta" class="mb-4 text-sm text-zinc-400">상점 정보를 불러오는 중입니다...</div>
    <div class="glass-panel p-6 rounded-xl">
        <div class="relative w-full h-96">
            <canvas id="rankingChart"></canvas>
        </div>
        <div class="mt-6 pt-4 border-t border-zinc-800/50">
            <h4 class="text-xs font-semibold text-zinc-400 mb-3">현재 추적 리스트</h4>
            <div id="trackedKeywordsList" class="flex flex-wrap gap-2">
                <!-- JS에서 채워짐 -->
            </div>
        </div>
    </div>
    
    <div class="glass-panel p-6 rounded-xl space-y-4 border-t border-indigo-500/20">
        <div class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-emerald-400">새로운 추적 키워드 수동 등록</h3>
            <span class="text-xs text-zinc-500">추가 즉시 모니터링 대기 대상으로 등록됩니다</span>
        </div>
        <div class="flex gap-2">
            <input type="text" id="chartAddKeywordInput" placeholder="추적할 연관 검색어를 입력하세요 (여러 개일 경우 콤마로 구분)" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 text-white placeholder-zinc-500">
            <button onclick="addKeywordFromChartView()" class="px-6 py-2 bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500/40 rounded-lg text-sm font-semibold border border-indigo-500/50 transition-colors whitespace-nowrap">+ 수동 추가</button>
        </div>
    </div>

    <!-- 동선 기반 키워드 발굴기 -->
    <div class="glass-panel p-6 rounded-xl border border-orange-500/30 shadow-[0_0_15px_rgba(249,115,22,0.1)]">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h3 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-pink-500">🔥 고객 동선 기반 SEO 황금 키워드 발굴 (BETA)</h3>
                <p class="text-xs text-zinc-400 mt-1">실제 마케팅(SEO) 타겟이 될 핵심 키워드들을 발굴하고 모바일 검색 시 내 가게의 노출 현황을 한눈에 점검합니다.</p>
            </div>
        </div>
        <div class="flex gap-2 mb-6">
            <input type="text" id="journeyBaseKeyword" placeholder="대표 메인 키워드 1개 입력 (예: 서면 고기집)" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-orange-500">
            <button onclick="runCustomerJourney()" class="px-6 py-2 bg-gradient-to-r from-orange-500 to-pink-600 text-white rounded-lg text-sm font-bold shadow-lg shadow-orange-500/20 hover:shadow-orange-500/40 transition-all flex items-center justify-center min-w-[140px]">
                <span id="journeyBtnText">발굴 시작 🚀</span>
                <div id="journeySpinner" class="hidden animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full ml-2"></div>
            </button>
        </div>
        
        <!-- 어드민 전용 데이터 테이블 (Data Sheet) -->
        <div id="journeyBoard" class="hidden overflow-x-auto mt-6 border border-zinc-700/50 rounded-xl bg-zinc-900/50">
            <table class="w-full text-left text-sm text-zinc-300">
                <thead class="text-xs text-zinc-400 uppercase bg-zinc-800/80 border-b border-zinc-700/50">
                    <tr>
                        <th scope="col" class="px-4 py-3 w-28 text-center text-zinc-500 font-semibold tracking-wider">강도</th>
                        <th scope="col" class="px-4 py-3 text-zinc-400 font-semibold tracking-wider">추천 키워드</th>
                        <th scope="col" class="px-4 py-3 text-zinc-500 font-semibold tracking-wider">발생 출처(부모)</th>
                        <th scope="col" class="px-4 py-3 text-right text-zinc-300 font-bold tracking-wider">총 검색량</th>
                        <th scope="col" class="px-4 py-3 text-center text-teal-400 font-semibold tracking-wider">노출 상태</th>
                        <th scope="col" class="px-4 py-3 text-center text-yellow-400 font-bold tracking-wider">PLACE 순위</th>
                        <th scope="col" class="px-4 py-3 text-right text-teal-300 font-semibold tracking-wider">출현 빈도</th>
                        <th scope="col" class="px-4 py-3 text-right text-blue-400 font-semibold tracking-wider">PC 검색</th>
                        <th scope="col" class="px-4 py-3 text-right text-pink-400 font-semibold tracking-wider">MO 검색</th>
                        <th scope="col" class="px-4 py-3 text-right text-blue-300/80 font-semibold tracking-wider">PC 클릭</th>
                        <th scope="col" class="px-4 py-3 text-right text-pink-300/80 font-semibold tracking-wider">MO 클릭</th>
                        <th scope="col" class="px-4 py-3 text-right text-blue-300 font-semibold tracking-wider">PC CTR</th>
                        <th scope="col" class="px-4 py-3 text-right text-orange-400 font-semibold tracking-wider">MO CTR</th>
                        <th scope="col" class="px-4 py-3 text-center text-purple-400 font-semibold tracking-wider">경쟁정도</th>
                        <th scope="col" class="px-4 py-3 text-right text-zinc-400 font-semibold tracking-wider">광고수</th>
                        <th scope="col" class="px-4 py-3 text-center text-zinc-500 font-semibold tracking-wider">동작</th>
                    </tr>
                </thead>
                <tbody id="journeyTableBody" class="divide-y divide-zinc-700/50">
                    <!-- JS에서 렌더링 -->
                </tbody>
            </table>
        </div>
    </div>
</section>

<script>
    async function loadStoreChart(storeId, storeName, placeId) {
        currentStoreId = storeId;
        currentPlaceId = placeId;
        
        document.getElementById('registerView').classList.add('hidden');
        document.getElementById('chartView').classList.remove('hidden');
        document.getElementById('chartStoreTitle').innerText = `${storeName} 랭킹 추이`;

        // 상점 기초 메타정보 비동기 렌더링
        const metaDiv = document.getElementById('chartStoreMeta');
        metaDiv.innerHTML = `<span class="animate-pulse text-indigo-400">네이버 로컬 데이터 동기화 중...</span>`;
        if (placeId) {
            fetch('/api/store/deep-scrape', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ place_id: placeId })
            }).then(res => res.json()).then(json => {
                if(json.status === 'success') {
                    const d = json.data;
                    metaDiv.innerHTML = `
                        <div class="flex flex-wrap items-center gap-3">
                            <span class="bg-indigo-900/50 text-indigo-300 px-2 py-1 rounded border border-indigo-700/50 text-xs font-medium">카테고리: ${d.category}</span>
                            <span class="bg-zinc-800 text-zinc-300 px-2 py-1 rounded border border-zinc-700/50 text-xs flex items-center gap-1">⭐ 리뷰 ${d.review_count || 0}</span>
                            <span class="bg-zinc-800 text-zinc-300 px-2 py-1 rounded border border-zinc-700/50 text-xs flex items-center gap-1">저장 ❤️ ${d.save_count || 0}</span>
                            ${d.official_keywords && d.official_keywords.length > 0 ? 
                                `<div class="flex gap-1 ml-2 border-l border-zinc-700 pl-3">
                                    ${d.official_keywords.slice(0, 4).map(k => `<span class="text-xs bg-orange-900/30 text-orange-400 px-1.5 py-0.5 rounded">#${k}</span>`).join('')}
                                </div>` : ''
                            }
                        </div>
                    `;
                } else {
                    metaDiv.innerHTML = `<span class="text-zinc-500 text-xs">상세 메타정보를 불러오지 못했습니다.</span>`;
                }
            }).catch(() => {
                metaDiv.innerHTML = `<span class="text-zinc-500 text-xs">상세 메타정보 네트워크 오류</span>`;
            });
        } else {
            metaDiv.innerHTML = '';
        }
        try {
            const res = await fetch(`/api/store/history/${storeId}`);
            const json = await res.json();
            
            if(json.status === 'success') {
                drawChart(json.data);
            }
        } catch (e) { console.error(e); }
    }

    function drawChart(historyDict) {
        const ctx = document.getElementById('rankingChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        
        let allTimes = new Set();
        for(let kw in historyDict) {
            historyDict[kw].forEach(record => allTimes.add(record.scraped_at));
        }
        const timeLabels = Array.from(allTimes).sort();

        const brightColors = ['#60a5fa', '#34d399', '#f472b6', '#fbbf24', '#a78bfa', '#f87171', '#38bdf8', '#818cf8'];
        let datasets = [];
        let colorIdx = 0;
        
        const badgeList = document.getElementById('trackedKeywordsList');
        badgeList.innerHTML = '';

        for(let kw in historyDict) {
            // [UI 랜더링 로직] 키워드 뱃지 (수집 대기 여부 표시)
            let badge = document.createElement('span');
            badge.className = 'text-xs px-2 py-1 rounded border flex items-center gap-2 transition-all';
            const hasData = historyDict[kw].length > 0;
            
            if (hasData) {
                badge.className += ' bg-zinc-800 border-zinc-600 text-zinc-300';
                badge.innerHTML = `<span>${kw}</span>`;
            } else {
                badge.className += ' bg-indigo-900/20 border-indigo-700/50 text-indigo-300';
                badge.innerHTML = `<span>${kw}</span><span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span></span> <span class="text-[10px] text-indigo-400/80">수집 대기중</span>`;
            }
            badgeList.appendChild(badge);

            let organicPoints = timeLabels.map(t => {
                let record = historyDict[kw].find(r => r.scraped_at === t && r.is_ad === 0);
                if(record && record.rank > 0) return record.rank; 
                return null;
            });
            
            let adPoints = timeLabels.map(t => {
                let record = historyDict[kw].find(r => r.scraped_at === t && r.is_ad === 1);
                if(record && record.rank > 0) return record.rank; 
                return null;
            });
            
            const color = brightColors[colorIdx % brightColors.length];
            
            if (organicPoints.some(v => v !== null)) {
                datasets.push({
                    label: kw,
                    data: organicPoints,
                    borderColor: color,
                    backgroundColor: color + '33',
                    borderWidth: 2,
                    borderDash: [],
                    tension: 0.3,
                    spanGaps: false
                });
            }
            
            if (adPoints.some(v => v !== null)) {
                datasets.push({
                    label: kw + ' (광고)',
                    data: adPoints,
                    borderColor: color,
                    backgroundColor: color + '11',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    tension: 0.3,
                    spanGaps: false
                });
            }
            colorIdx++;
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeLabels.map(t => new Date(t).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'numeric', minute:'numeric'})),
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                color: '#a1a1aa',
                scales: {
                    y: {
                        reverse: true,
                        min: 1,
                        max: 300,
                        title: { display: true, text: '네이버 노출 순위', color: '#71717a' },
                        grid: { color: '#27272a' }
                    },
                    x: {
                        grid: { color: '#27272a' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#f4f4f5' } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.dataset.label}: ${context.raw}위`;
                            }
                        }
                    }
                }
            }
        });
    }

    async function addKeywordFromChartView() {
        if (!currentStoreId) return showToast("상점 정보가 로드되지 않았습니다.", "error");
        const raw = document.getElementById('chartAddKeywordInput').value.trim();
        if (!raw) return showToast("추가할 키워드를 입력해주세요.", "warning");
        
        const kws = raw.split(',').map(s => s.trim()).filter(s => s);
        try {
            const res = await fetch(`/api/store/${currentStoreId}/keywords`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(kws)
            });
            const json = await res.json();
            if(json.status === 'success') {
                showToast(`✅ ${kws.length}개의 키워드 수동 등록 완료! 현재 백그라운드 랭킹 수집기가 작동했습니다. 잠시 후 차트에 반영됩니다.`, "success");
                document.getElementById('chartAddKeywordInput').value = "";
                const storeName = document.getElementById('chartStoreTitle').innerText.replace(" 랭킹 추이", "").trim();
                // 잠시 대기 후 차트를 리프레시하여 시각적 반응성 제공
                setTimeout(() => loadStoreChart(currentStoreId, storeName, currentPlaceId), 1000);
            } else {
                showToast("추가 중 오류 발생: " + json.message, "error");
            }
        } catch(e) { console.error(e); }
    }

    async function runCustomerJourney() {
        const btnText = document.getElementById('journeyBtnText');
        const spinner = document.getElementById('journeySpinner');
        const kwInput = document.getElementById('journeyBaseKeyword');
        const board = document.getElementById('journeyBoard');
        
        const keyword = kwInput.value.trim();
        if(!keyword) return showToast("💡 고객 검색 동선을 파악할 대표 메인 키워드를 입력해주세요.", "warning");
        
        // 현재 선택된 상점의 이름 추출
        const titleText = document.getElementById('chartStoreTitle').innerText;
        const targetStoreName = titleText.replace(" 랭킹 추이", "").trim();
        
        btnText.innerText = "분석 중...";
        spinner.classList.remove('hidden');
        board.classList.add('hidden');
        
        try {
            const res = await fetch('/api/store/discover-keywords', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    keyword: keyword,
                    target_store_name: targetStoreName
                })
            });
            
            const json = await res.json();
            if(json.status === 'success') {
                showToast("🔥 데이터 발굴이 완료되었습니다!", "success");
                renderJourneyDataSheet(json.data);
                board.classList.remove('hidden');
            } else {
                showToast("발굴 오류: " + json.message, "error");
            }
        } catch(e) {
            showToast("네트워크 API 통신 에러가 발생했습니다.", "error");
        } finally {
            btnText.innerText = "발굴 시작 🚀";
            spinner.classList.add('hidden');
        }
    }
    
    function renderJourneyDataSheet(data) {
        const tbody = document.getElementById('journeyTableBody');
        tbody.innerHTML = '';
        
        const allItems = [];
        if(data.high) data.high.forEach(item => allItems.push({...item, level: "high"}));
        if(data.mid) data.mid.forEach(item => allItems.push({...item, level: "mid"}));
        if(data.low) data.low.forEach(item => allItems.push({...item, level: "low"}));
        
        allItems.forEach(item => {
            let badgeHTML = "";
            let bgClass = "hover:bg-zinc-800/80 transition-colors cursor-default";
            
            if (item.level === "high") {
                badgeHTML = `<span class="inline-flex items-center justify-center gap-1.5 py-1 px-2 text-xs font-semibold bg-red-500/10 text-red-400 border border-red-500/20 w-full">🔥 상</span>`;
            } else if (item.level === "mid") {
                badgeHTML = `<span class="inline-flex items-center justify-center gap-1.5 py-1 px-2 text-xs font-semibold bg-orange-500/10 text-orange-400 border border-orange-500/20 w-full">🚀 중</span>`;
            } else {
                badgeHTML = `<span class="inline-flex items-center justify-center gap-1.5 py-1 px-2 text-xs font-semibold bg-green-500/10 text-green-400 border border-green-500/20 w-full">⭐ 하</span>`;
            }
            
            const isExposedBadge = item.is_exposed ?
                '<span class="bg-teal-500/20 text-teal-400 border border-teal-500/50 px-2 py-1 rounded text-xs">노출 ⭕</span>' :
                '<span class="bg-red-500/10 text-red-500/60 border border-red-500/20 px-2 py-1 rounded text-xs opacity-60">미노출 ❌</span>';
                
            const organicBadge = item.place_rank > 0 ? 
                `<span class="bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 px-2 py-1 rounded text-xs font-bold leading-none">${item.place_rank}위</span>` :
                `<span class="bg-zinc-800 text-zinc-500 border border-zinc-700 px-2 py-1 rounded text-xs font-medium leading-none whitespace-nowrap">-</span>`;
                
            const adBadge = item.ad_rank > 0 ? 
                `<span class="bg-indigo-500/20 text-indigo-400 border border-indigo-500/50 px-2 py-1 rounded text-xs font-bold leading-none">광고 ${item.ad_rank}위</span>` :
                '';
                
            const placeRankHTML = `<div class="flex flex-col items-center justify-center gap-1">${organicBadge}${adBadge}</div>`;
                
            const expCount = item.exposure_count > 0 ? `<span class="text-teal-400 font-bold">${item.exposure_count}회</span>` : `<span class="text-zinc-600">-</span>`;
            
            const tr = document.createElement('tr');
            tr.className = bgClass;
            tr.innerHTML = `
                <td class="px-4 py-3 whitespace-nowrap text-center">${badgeHTML}</td>
                <td class="px-4 py-3 font-semibold text-white break-keep lg:min-w-[200px] hover:text-indigo-400 transition-colors cursor-pointer select-all">${item.keyword}</td>
                <td class="px-4 py-3 text-zinc-500 text-xs">
                    <div class="flex items-center gap-1">
                        <span class="truncate max-w-[120px]" title="${item.parent || ''}">${item.parent || '-'}</span>
                        <span class="px-1 py-0.5 rounded text-[10px] bg-zinc-800/80 border border-zinc-700/50">D${item.depth || 1}</span>
                    </div>
                </td>
                <td class="px-4 py-3 text-right font-mono text-zinc-200 font-bold bg-zinc-800/20">${(item.total_vol || 0).toLocaleString()}</td>
                <td class="px-4 py-3 text-center whitespace-nowrap">${isExposedBadge}</td>
                <td class="px-4 py-3 text-center whitespace-nowrap">${placeRankHTML}</td>
                <td class="px-4 py-3 text-right font-mono text-xs">${expCount}</td>
                <td class="px-4 py-3 text-right font-mono text-blue-400">${(item.pc_vol || 0).toLocaleString()}</td>
                <td class="px-4 py-3 text-right font-mono text-pink-400">${(item.mobile_vol || 0).toLocaleString()}</td>
                <td class="px-4 py-3 text-right font-mono text-blue-300/70 text-xs">${(item.pc_click_cnt || 0.0)}</td>
                <td class="px-4 py-3 text-right font-mono text-pink-300/70 text-xs">${(item.mobile_click_cnt || 0.0)}</td>
                <td class="px-4 py-3 text-right font-mono text-blue-300 text-xs">${(item.pc_click_rate || 0)}%</td>
                <td class="px-4 py-3 text-right font-mono font-bold text-orange-400">${(item.mobile_click_rate || 0)}%</td>
                <td class="px-4 py-3 text-center">
                    <span class="px-2 py-1 rounded text-xs font-semibold ${item.comp_level === '높음' ? 'bg-red-500/20 text-red-400 border border-red-500/30' : item.comp_level === '낮음' ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-zinc-700 text-zinc-300 border border-zinc-600'}">${item.comp_level || '보통'}</span>
                </td>
                <td class="px-4 py-3 text-right font-mono text-zinc-400 text-xs">${item.ads_count || 0}</td>
                <td class="px-4 py-3 text-center">
                    <button class="add-kw-btn px-4 py-1.5 bg-zinc-800 hover:bg-indigo-600 text-zinc-300 hover:text-white text-xs font-bold rounded-md border border-zinc-700 hover:border-indigo-500 transition-all shadow-sm">
                        + 추가
                    </button>
                </td>
            `;
            
            const btn = tr.querySelector('.add-kw-btn');
            btn.onclick = () => {
                const input = document.getElementById('chartAddKeywordInput');
                if(input.value && !input.value.endsWith(', ')) {
                    input.value = input.value + ', ' + item.keyword;
                } else {
                    input.value += item.keyword;
                }
                input.focus();
                input.classList.add('ring-2', 'ring-indigo-500');
                setTimeout(() => input.classList.remove('ring-2', 'ring-indigo-500'), 500);
                
                const originalText = btn.innerText;
                btn.innerText = "✅ 찜";
                btn.classList.add("bg-green-600/20", "text-green-400", "border-green-500/50");
                btn.classList.remove("hover:bg-indigo-600", "hover:text-white", "hover:border-indigo-500", "text-zinc-300");
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove("bg-green-600/20", "text-green-400", "border-green-500/50");
                    btn.classList.add("hover:bg-indigo-600", "hover:text-white", "hover:border-indigo-500", "text-zinc-300");
                }, 1000);
            };
            
            tbody.appendChild(tr);
        });
    }
</script>
