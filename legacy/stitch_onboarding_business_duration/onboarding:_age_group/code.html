<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pathfinder - Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white transition-colors duration-200">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#1a2632] px-6 py-4 md:px-10">
<div class="flex items-center gap-4">
<div class="size-8 text-primary">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 18.4228L42 11.475V34.3663C42 34.7796 41.7457 35.1504 41.3601 35.2992L24 42V18.4228Z" fill="currentColor" fill-rule="evenodd"></path>
<path clip-rule="evenodd" d="M24 8.18819L33.4123 11.574L24 15.2071L14.5877 11.574L24 8.18819ZM9 15.8487L21 20.4805V37.6263L9 32.9945V15.8487ZM27 37.6263V20.4805L39 15.8487V32.9945L27 37.6263ZM25.354 2.29885C24.4788 1.98402 23.5212 1.98402 22.646 2.29885L4.98454 8.65208C3.7939 9.08038 3 10.2097 3 11.475V34.3663C3 36.0196 4.01719 37.5026 5.55962 38.098L22.9197 44.7987C23.6149 45.0671 24.3851 45.0671 25.0803 44.7987L42.4404 38.098C43.9828 37.5026 45 36.0196 45 34.3663V11.475C45 10.2097 44.2061 9.08038 43.0155 8.65208L25.354 2.29885Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Pathfinder</h2>
</div>
<button class="flex items-center justify-center rounded-lg h-9 px-4 bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-semibold transition-colors">
<span class="truncate">Save &amp; Exit</span>
</button>
</header>
<!-- Content Area -->
<main class="flex flex-1 justify-center items-start md:items-center py-8 px-4 sm:px-6 lg:px-8">
<div class="flex flex-col w-full max-w-[640px] gap-8 animate-fade-in">
<!-- Progress Bar -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<p class="text-slate-900 dark:text-white text-sm font-semibold uppercase tracking-wider">Step 2 of 5</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Profile Setup</p>
</div>
<div class="h-2 w-full rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
<div class="h-full rounded-full bg-primary transition-all duration-500 ease-out" style="width: 40%;"></div>
</div>
</div>
<!-- Page Heading -->
<div class="flex flex-col gap-2">
<h1 class="text-slate-900 dark:text-white text-3xl md:text-4xl font-bold leading-tight">대표님의 연령대는?</h1>
<p class="text-slate-500 dark:text-slate-400 text-base md:text-lg">정부 지원사업 매칭을 위해 필요한 정보입니다.</p>
</div>
<!-- Selection Cards (Radio Group) -->
<div aria-labelledby="age-group-label" class="grid grid-cols-1 md:grid-cols-2 gap-4" role="radiogroup">
<!-- Option 1: Under 39 -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="age-group" type="radio" value="under39"/>
<div class="h-full flex flex-col items-start p-6 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-[#1a2632] transition-all duration-200 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-[#203040] peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 peer-checked:shadow-md">
<div class="mb-4 p-3 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-primary w-fit">
<span class="material-symbols-outlined text-3xl">face_6</span>
</div>
<h3 class="text-slate-900 dark:text-white text-xl font-bold mb-1">만 39세 이하</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">청년 창업 우대 혜택을<br/>받을 수 있습니다.</p>
<!-- Checkmark for active state -->
<div class="absolute top-4 right-4 text-primary opacity-0 peer-checked:opacity-100 transition-opacity scale-90 peer-checked:scale-100">
<span class="material-symbols-outlined filled">check_circle</span>
</div>
</div>
</label>
<!-- Option 2: Over 39 -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="age-group" type="radio" value="over39"/>
<div class="h-full flex flex-col items-start p-6 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-[#1a2632] transition-all duration-200 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-[#203040] peer-checked:border-primary peer-checked:bg-primary/5 dark:peer-checked:bg-primary/10 peer-checked:shadow-md">
<div class="mb-4 p-3 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 w-fit">
<span class="material-symbols-outlined text-3xl">psychology</span>
</div>
<h3 class="text-slate-900 dark:text-white text-xl font-bold mb-1">만 39세 초과</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">일반 창업 및 중장년 기술창업<br/>지원을 매칭해드립니다.</p>
<!-- Checkmark for active state -->
<div class="absolute top-4 right-4 text-primary opacity-0 peer-checked:opacity-100 transition-opacity scale-90 peer-checked:scale-100">
<span class="material-symbols-outlined filled">check_circle</span>
</div>
</div>
</label>
</div>
<!-- Info Box (Tooltip context) -->
<div class="flex items-start gap-3 p-4 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 mt-0.5 shrink-0 text-xl">info</span>
<p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
<strong class="font-bold text-slate-800 dark:text-slate-200">Tip:</strong> 만 39세는 '청년창업사관학교' 등 주요 정부 지원사업의 청년 우대 기준이 되는 중요한 나이입니다. 정확하게 선택해 주세요.
                    </p>
</div>
<!-- Navigation Buttons -->
<div class="flex items-center justify-between pt-4 mt-auto md:mt-4 border-t border-transparent md:border-slate-100 md:dark:border-slate-800">
<button class="flex items-center justify-center h-12 px-6 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold transition-colors">
                        이전
                    </button>
<button class="group flex items-center justify-center h-12 px-8 rounded-lg bg-primary hover:bg-blue-600 text-white font-bold shadow-sm hover:shadow transition-all disabled:opacity-50 disabled:cursor-not-allowed">
<span>다음</span>
<span class="material-symbols-outlined ml-2 text-sm transition-transform group-hover:translate-x-1">arrow_forward_ios</span>
</button>
</div>
</div>
</main>
</div>
<style>
        .filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</body></html>
