# 카카오 OAuth 2.0 설정 (운영환경)
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:your_kakao_rest_api_key}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI:https://yourdomain.com/kakao/callback}
  channel-public-id: ${KAKAO_CHANNEL_PUBLIC_ID:}
  authorize-uri: https://kauth.kakao.com/oauth/authorize
  # 운영에서도 동일한 필수 스코프를 요구합니다.
  required-scopes: profile_nickname,profile_image,account_email,name,gender,age_range,birthday,birthyear,phone_number,plusfriends,talk_message

# 멤버십 기본 정책 (운영)
membership:
  free-trial-days: ${MEMBERSHIP_FREE_TRIAL_DAYS:-1}

payment:
  recurring:
    test-mode:
      enabled: ${PAYMENT_TEST_SCHEDULE_ENABLED:false}
      minute-interval: ${PAYMENT_TEST_SCHEDULE_MINUTE_INTERVAL:0}
    backup-scheduler:
      enabled: ${PAYMENT_BACKUP_SCHEDULER_ENABLED:false}
  timezone:
    default: Asia/Seoul
    default-billing-time: "09:00"
