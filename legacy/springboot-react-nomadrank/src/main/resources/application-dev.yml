server:
  # 기본을 HTTPS 8443으로. 필요 시 PORT로 오버라이드
  port: ${PORT:8081}
  compression:
    enabled: true
  servlet:
    session:
      timeout: 2600000
      cookie:
        max-age: 2600000
        same-site: lax # 크로스도메인 허용
        secure: false # 기본은 HTTP 가정. SSL 쓰면 true 고려

  # 간단한 개발용 SSL (PEM) — Spring Boot 3.x에서 지원
  ssl:
    # 기본 true로 하여 실행 시 바로 HTTPS
    enabled: ${SSL_ENABLED:false}
    # 프로젝트 루트의 PEM 파일 사용 (cert.pem/key.pem)
    # 절대경로나 classpath로도 지정 가능
    certificate: ${SSL_CERT_PATH:cert.pem}
    certificate-private-key: ${SSL_CERT_KEY_PATH:key.pem}
    # self-signed 경고는 개발에서 정상 동작

