payment:
  scheduler:
    reservation:
      # inspect-start-days:
      #   예약 검사 시작 기준일을 의미한다.
      #   “다음 결제일로부터 며칠 전부터 예약 누락을 확인할 것인가?”를 결정한다.
      #   예: 1 → 다음 결제일 D-1일부터 검사 시작.
      inspect-start-days: 1

      # inspect-end-days:
      #   예약 검사 종료 기준일을 의미한다.
      #   “다음 결제일로부터 며칠 후까지 검사할 것인가?”를 결정한다.
      #   예: 5 → 다음 결제일 이후 D+5일까지 예약 누락/지연을 감시.
      #   start ≤ end 범위 내에서 스케줄러가 구독 상태를 훑는다.
      inspect-end-days: 5

      # max-retry-attempts:
      #   PortOne 예약 생성이 실패했을 때 재시도할 최대 횟수.
      #   네트워크 오류, 일시적 PortOne 장애, BillingKey 반영 지연 등에서 사용된다.
      #   예: 3 → 실패하면 최대 3회까지 재시도 큐에 넣어 복구 시도.
      max-retry-attempts: 3

      # retry-interval-minutes:
      #   예약 생성 실패 후 다음 재시도까지 기다리는 시간(분 단위).
      #   예: 60 → 1시간 간격으로 재시도.
      #   스케줄러는 이 값에 따라 재시도 타이밍을 관리한다.
      retry-interval-minutes: 60
  recurring:
    test-mode:
      enabled: ${PAYMENT_TEST_SCHEDULE_ENABLED:false}
      minute-interval: ${PAYMENT_TEST_SCHEDULE_MINUTE_INTERVAL:0}
    backup-scheduler:
      enabled: ${PAYMENT_BACKUP_SCHEDULER_ENABLED:false}
  timezone:
    default: Asia/Seoul
    default-billing-time: "09:00"
